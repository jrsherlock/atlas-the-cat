<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas Massacre | Choose Your Adventure</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 2.5rem 1.5rem 0.5rem;
      max-width: 720px;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f0f0f0;
    }

    .subtitle {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #999;
    }

    main {
      width: 100%;
      max-width: 860px;
      padding: 1.5rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- Poster / static image --- */
    .poster-wrap {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    #poster {
      display: block;
      width: 100%;
      height: auto;
      background: #000;
    }

    /* --- Choice screen --- */
    .choices {
      margin-top: 2rem;
      text-align: center;
      width: 100%;
    }

    .choices h2 {
      font-size: clamp(1.1rem, 3.5vw, 1.5rem);
      font-weight: 600;
      color: #d0d0d0;
      margin-bottom: 0.4rem;
    }

    .choices p {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .btn-row {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .choice-btn {
      flex: 1 1 260px;
      max-width: 380px;
      padding: 1.4rem 1.6rem;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      color: #e0e0e0;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
      font-family: inherit;
    }

    .choice-btn:hover {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .choice-btn:active {
      transform: translateY(0);
    }

    .choice-btn .tile-img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 0.6rem;
    }

    .choice-btn .icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .choice-btn .label {
      font-size: 1.05rem;
      font-weight: 600;
      display: block;
      margin-bottom: 0.3rem;
    }

    .choice-btn .desc {
      font-size: 0.85rem;
      color: #999;
      line-height: 1.4;
    }

    /* --- Video screen (hidden initially) --- */
    .video-screen {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
    }

    .video-screen.active {
      display: flex;
    }

    .video-wrap {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    video {
      display: block;
      width: 100%;
      height: auto;
      background: #000;
    }

    .back-btn {
      margin-top: 1.5rem;
      padding: 0.7rem 1.6rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.4s ease;
      opacity: 0.4;
    }

    .back-btn:hover {
      border-color: rgba(255,255,255,0.3);
      color: #e0e0e0;
    }

    .back-btn.glow {
      opacity: 1;
      color: #f0f0f0;
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 0 12px rgba(255,255,255,0.15), 0 0 30px rgba(139,92,246,0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 12px rgba(255,255,255,0.15), 0 0 30px rgba(139,92,246,0.2); }
      50% { box-shadow: 0 0 18px rgba(255,255,255,0.25), 0 0 44px rgba(139,92,246,0.35); }
    }

    /* --- Fade transitions --- */
    .scene { transition: opacity 0.4s ease; }
    .scene.fade-out { opacity: 0; pointer-events: none; }

    footer {
      margin-top: auto;
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: #444;
    }

    footer a { color: #7c7cba; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1>The Atlas Chronicles</h1>
    <p class="subtitle">A choose-your-own-adventure experience</p>
  </header>

  <main>
    <!-- SCENE 1: Poster + Choices -->
    <div id="scene-choice" class="scene">
      <div class="poster-wrap">
        <img id="poster" src="poster.png" alt="Atlas the cat sitting in a flower pot">
      </div>

      <div class="choices">
        <h2>What happens next?</h2>
        <p>Atlas the cat sits regally in his flower pot, surveying the garden...</p>

        <div class="btn-row">
          <button class="choice-btn" onclick="playVideo('atlas-butterflies.mp4')">
            <img class="tile-img" src="atlas-butterflies.png" alt="Atlas with butterflies">
            <span class="label">A Peaceful Afternoon</span>
            <span class="desc">Butterflies gently flutter about Atlas's head as he basks in the warm sun, undisturbed and content.</span>
          </button>

          <button class="choice-btn" onclick="playVideo('atlas-blood.mp4')">
            <img class="tile-img" src="atlas-bunny.png" alt="Atlas spots a bunny">
            <span class="label">An Uninvited Guest</span>
            <span class="desc">A cute little bunny hops into view. Atlas springs into action to defend the homefront!</span>
          </button>
        </div>
      </div>
    </div>

    <!-- SCENE 2: Video Player -->
    <div id="scene-video" class="scene video-screen">
      <div class="video-wrap">
        <video id="player" playsinline webkit-playsinline></video>
      </div>
      <button class="back-btn" onclick="goBack()">Choose again</button>
    </div>
  </main>

  <footer>
    <p>View on <a href="https://github.com/jrsherlock/atlas-the-cat">GitHub</a></p>
  </footer>

  <script>
    const sceneChoice = document.getElementById('scene-choice');
    const sceneVideo = document.getElementById('scene-video');
    const player = document.getElementById('player');
    const backBtn = document.querySelector('.back-btn');

    // Tap video to pause/play
    player.addEventListener('click', () => {
      if (player.paused) player.play();
      else player.pause();
    });

    // Illuminate the back button once video ends
    player.addEventListener('ended', () => {
      player.controls = true;
      backBtn.classList.add('glow');
    });

    function playVideo(src) {
      player.controls = false;
      backBtn.classList.remove('glow');
      player.src = src;
      sceneChoice.classList.add('fade-out');
      setTimeout(() => {
        sceneChoice.style.display = 'none';
        sceneVideo.classList.add('active');
        player.currentTime = 0;
        player.play();
      }, 400);
    }

    function goBack() {
      player.pause();
      player.controls = false;
      sceneVideo.classList.remove('active');
      sceneChoice.style.display = '';
      void sceneChoice.offsetWidth;
      sceneChoice.classList.remove('fade-out');
    }
  </script>

</body>
</html>
